name: Deploy to GitHub Pages

# Publishes the static app to GitHub Pages. The site is plain HTML/CSS/JS with
# no build step, so we upload the repo as-is. All asset paths are relative, so
# it works served from the project subpath (…github.io/calmmedown/).

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Permissions the deploy needs (least privilege).
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
